<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 40px; background: var(--bg-page); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 28px; }
  .lbl { width: 100%; font: var(--fw-medium) 11px var(--font-ui); letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Badge, Overline, Card } = window.HMGWatchesDesignSystem_1cb2d0;
  function Demo() {
    return (
      <>
        <div className="row">
          <span className="lbl">Disponibilidade & tendência</span>
          <Badge variant="available" />
          <Badge variant="sold" />
          <Badge variant="up">+23% em 6 meses</Badge>
          <Badge variant="down">−4% 24h</Badge>
          <Badge variant="gold">Destaque</Badge>
        </div>
        <div className="row">
          <span className="lbl">Overline + superfície</span>
          <Card interactive style={{ maxWidth: 320 }}>
            <Overline>Coleção em destaque</Overline>
            <h3 style={{ marginTop: 10, fontSize: 24 }}>Relógios de exceção</h3>
          </Card>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
