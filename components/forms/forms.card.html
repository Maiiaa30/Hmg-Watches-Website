<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 40px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px 48px; max-width: 620px; }
  .stack { display: flex; flex-direction: column; gap: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Checkbox } = window.HMGWatchesDesignSystem_1cb2d0;
  function Demo() {
    const [c1, setC1] = React.useState(true);
    const [c2, setC2] = React.useState(false);
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Nome" placeholder="O seu nome" />
          <Input label="Email" type="email" placeholder="nome@email.com" hint="Respondemos em 24 a 48 horas úteis." />
        </div>
        <div className="stack">
          <Select label="Assunto" options={["Quero comprar um relógio","Tenho um relógio para vender","Informação geral"]} />
          <div className="stack" style={{ gap: 14, marginTop: 8 }}>
            <Checkbox label="Rolex" checked={c1} onChange={(e)=>setC1(e.target.checked)} />
            <Checkbox label="Patek Philippe" checked={c2} onChange={(e)=>setC2(e.target.checked)} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
