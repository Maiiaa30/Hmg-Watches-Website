<!-- @dsCard group="Colors" viewport="700x180" name="Tinta & ouro" subtitle="Carvão quente, taupe, ouro refinado" -->
<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .sw { border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 76px; }
  .meta { padding: 10px 12px; }
  .name { font: var(--fw-medium) 12px var(--font-ui); color: var(--text-primary); }
  .hex { font: 400 11px var(--font-mono); color: var(--text-tertiary); margin-top: 3px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1A1814"></div><div class="meta"><div class="name">Tinta (texto)</div><div class="hex">#1A1814</div></div></div>
    <div class="sw"><div class="chip" style="background:#5C5648"></div><div class="meta"><div class="name">Secundário</div><div class="hex">#5C5648</div></div></div>
    <div class="sw"><div class="chip" style="background:#938A78"></div><div class="meta"><div class="name">Terciário</div><div class="hex">#938A78</div></div></div>
    <div class="sw"><div class="chip" style="background:#B68A2E"></div><div class="meta"><div class="name">Ouro (acento)</div><div class="hex">#B68A2E</div></div></div>
    <div class="sw"><div class="chip" style="background:#C9A24B"></div><div class="meta"><div class="name">Ouro brilho</div><div class="hex">#C9A24B</div></div></div>
  </div>
</body></html>
