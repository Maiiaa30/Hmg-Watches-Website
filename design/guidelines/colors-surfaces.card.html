<!-- @dsCard group="Colors" viewport="700x180" name="Superfícies & fundo" subtitle="Tela de marfim quente — a luz é a identidade" -->
<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .sw { border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 76px; }
  .meta { padding: 10px 12px; }
  .name { font: var(--fw-medium) 12px var(--font-ui); color: var(--text-primary); }
  .hex { font: 400 11px var(--font-mono); color: var(--text-tertiary); margin-top: 3px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F2EADB"></div><div class="meta"><div class="name">Marfim (página)</div><div class="hex">#F2EADB</div></div></div>
    <div class="sw"><div class="chip" style="background:#EADFC9"></div><div class="meta"><div class="name">Marfim fundo</div><div class="hex">#EADFC9</div></div></div>
    <div class="sw"><div class="chip" style="background:#FBF7EF"></div><div class="meta"><div class="name">Superfície</div><div class="hex">#FBF7EF</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">Card</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#E3D9C6"></div><div class="meta"><div class="name">Borda</div><div class="hex">#E3D9C6</div></div></div>
  </div>
</body></html>
