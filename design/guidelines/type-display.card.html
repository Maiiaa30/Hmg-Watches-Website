<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 36px 40px; background: var(--bg-page); }
  .stack > * + * { margin-top: 14px; }
  .lbl { font: var(--fw-medium) 10px var(--font-ui); letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--text-tertiary); }
  .d { font-family: var(--font-display); color: var(--text-primary); letter-spacing: var(--ls-tight); line-height: 1.05; }
</style></head>
<body>
  <div class="stack">
    <div><span class="lbl">Display XL · 76 / 1.08</span><div class="d" style="font-size:60px">Tempo que não se perde.</div></div>
    <div><span class="lbl">Title · 56 / 1.08</span><div class="d" style="font-size:40px">Relógios de exceção</div></div>
    <div><span class="lbl">Section · 40 / 1.25</span><div class="d" style="font-size:30px">Curados, autenticados</div></div>
  </div>
</body></html>
