<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 32px 40px; background: var(--bg-page); }
  .row { display: flex; align-items: flex-end; gap: 22px; }
  .item { text-align: center; }
  .bar { background: var(--accent); width: 100%; border-radius: 2px; }
  .v { font: 400 11px var(--font-mono); color: var(--text-tertiary); margin-top: 8px; }
  .t { font: var(--fw-medium) 11px var(--font-ui); color: var(--text-secondary); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px;width:8px"></div><div class="v">8</div><div class="t">sp-2</div></div>
    <div class="item"><div class="bar" style="height:16px;width:16px"></div><div class="v">16</div><div class="t">sp-4</div></div>
    <div class="item"><div class="bar" style="height:24px;width:24px"></div><div class="v">24</div><div class="t">sp-5</div></div>
    <div class="item"><div class="bar" style="height:32px;width:32px"></div><div class="v">32</div><div class="t">sp-6</div></div>
    <div class="item"><div class="bar" style="height:48px;width:48px"></div><div class="v">48</div><div class="t">sp-7</div></div>
    <div class="item"><div class="bar" style="height:64px;width:64px"></div><div class="v">64</div><div class="t">sp-8</div></div>
    <div class="item"><div class="bar" style="height:96px;width:96px"></div><div class="v">96</div><div class="t">sp-9</div></div>
  </div>
</body></html>
