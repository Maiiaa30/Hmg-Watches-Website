<!-- @dsCard group="Type" viewport="700x250" name="Corpo & UI sans" subtitle="DM Sans — leitura espaçosa, UI limpa" -->
<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 36px 40px; background: var(--bg-page); max-width: 700px; }
  .lbl { font: var(--fw-medium) 10px var(--font-ui); letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
  .blk + .blk { margin-top: 18px; }
  .editorial { font: 400 19px/1.8 var(--font-body); color: var(--text-secondary); }
  .ui { font: 400 16px/1.5 var(--font-body); color: var(--text-primary); }
  .mono { font: 400 13px var(--font-mono); color: var(--text-tertiary); }
</style></head>
<body>
  <div class="blk"><div class="lbl">Editorial · 19 / 1.8</div><div class="editorial">Cada relógio é selecionado à mão, autenticado e preparado para uma nova vida ao pulso de quem o procura.</div></div>
  <div class="blk"><div class="lbl">UI / corpo · 16 / 1.5</div><div class="ui">Texto de interface, descrições e especificações técnicas.</div></div>
  <div class="blk"><div class="lbl">Mono · referências</div><div class="mono">Ref. 126610LN · 904L Oystersteel</div></div>
</body></html>
