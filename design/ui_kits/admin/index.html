<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HMG Watches · Admin</title>
<link rel="icon" href="../../assets/favicon.svg" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; }
  #wrap { display: flex; min-height: 100vh; }
  #main { flex: 1; min-width: 0; }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script src="data.js"></script>
<script type="text/babel" src="../website/Icon.jsx"></script>
<script type="text/babel" src="../website/WatchVisual.jsx"></script>
<script type="text/babel" src="AdminShell.jsx"></script>
<script type="text/babel" src="AdminScreens.jsx"></script>

<script type="text/babel" data-presets="react">
  const TITLES = { dashboard: "Dashboard", watches: "Relógios", blog: "Blog", leads: "Leads", market: "Mercado", analytics: "Analytics", settings: "Definições" };
  function AdminApp() {
    const [route, setRoute] = React.useState("dashboard");
    const go = (r) => { setRoute(r); window.scrollTo(0, 0); };

    let screen, action = null;
    if (route === "dashboard") screen = <window.AdminDashboard />;
    else if (route === "watches") screen = <window.AdminWatches />;
    else if (route === "blog") screen = <window.AdminBlog />;
    else if (route === "analytics") screen = <window.AdminAnalytics />;
    else if (route === "settings") screen = <window.AdminSettings />;
    else if (route === "leads") screen = <window.AdminPlaceholder title="Leads" icon="users" />;
    else if (route === "market") screen = <window.AdminPlaceholder title="Gestão de Mercado" icon="trending-up" />;

    return (
      <div id="wrap">
        <window.AdminSidebar route={route} go={go} />
        <div id="main">
          <window.AdminTopbar title={TITLES[route]} action={action} />
          {screen}
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);
</script>
</body>
</html>
